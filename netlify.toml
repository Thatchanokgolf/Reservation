[build]
  publish = "."
  functions = "netlify/functions"

# Friendly path: /api/reservations -> the reservations function
[[redirects]]
  from = "/api/reservations"
  to = "/.netlify/functions/reservations"
  status = 200

# Friendly path: /api/fitness -> the fitness function (separate Neon DB)
[[redirects]]
  from = "/api/fitness"
  to = "/.netlify/functions/fitness"
  status = 200
