<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charal Prasit Lakeview — Reservation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 flex items-center justify-center p-4">
  <div class="w-full max-w-md text-center">
    <!-- Language toggle (top-right) -->
    <div class="flex justify-end mb-2">
      <button id="langToggle"
              class="rounded-full border border-slate-300 bg-white px-4 py-1.5 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50"></button>
    </div>

    <h1 class="text-3xl font-bold text-slate-900">Charal Prasit Lakeview</h1>
    <p data-i18n="subtitle" class="text-slate-500 mt-2 mb-8"></p>

    <div class="space-y-4">
      <a href="washing.html"
         class="block rounded-2xl bg-white shadow-sm hover:shadow-md transition p-6 border border-slate-200 hover:border-indigo-400">
        <div class="text-4xl">🧺</div>
        <div data-i18n="washing" class="mt-2 text-lg font-semibold text-slate-900"></div>
      </a>
      <a href="fitness.html"
         class="block rounded-2xl bg-white shadow-sm hover:shadow-md transition p-6 border border-slate-200 hover:border-indigo-400">
        <div class="text-4xl">🏋️</div>
        <div data-i18n="fitness" class="mt-2 text-lg font-semibold text-slate-900"></div>
      </a>
    </div>
  </div>

  <script>
    const I18N = {
      en: {
        subtitle: "Choose what you'd like to reserve",
        washing: "Washing Machine",
        fitness: "Fitness",
      },
      th: {
        subtitle: "เลือกสิ่งที่ต้องการจอง",
        washing: "เครื่องซักผ้า",
        fitness: "ฟิตเนส",
      },
    };
    let lang = localStorage.getItem("lang") || "th";
    function t(key) { return (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key; }
    function applyLang() {
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.getAttribute("data-i18n")); });
      document.getElementById("langToggle").textContent = lang === "th" ? "EN" : "ไทย";
    }
    document.getElementById("langToggle").onclick = () => {
      lang = lang === "th" ? "en" : "th";
      localStorage.setItem("lang", lang);
      applyLang();
    };
    applyLang();
  </script>
</body>
</html>
