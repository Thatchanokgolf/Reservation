<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Washing Machine Reservation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-slate-900">🧺 Washing Machine Reservation</h1>
    </header>

    <!-- Machine tabs -->
    <div class="flex justify-center gap-3 mb-6" id="machineTabs"></div>

    <!-- Date selector -->
    <div class="flex flex-col items-center gap-2 mb-6">
      <label for="dateSelect" class="text-sm font-medium text-slate-700">Select a date</label>
      <select id="dateSelect"
              class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></select>
    </div>

    <!-- Legend -->
    <div class="flex flex-wrap justify-center gap-4 mb-8 text-sm">
      <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-white border border-slate-300 inline-block"></span> Available</div>
      <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-rose-500 inline-block"></span> Reserved</div>
      <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-slate-200 inline-block"></span> Past</div>
    </div>

    <!-- Schedule -->
    <div id="schedule" class="space-y-6"></div>
  </div>

  <!-- Reservation Modal -->
  <div id="modalBackdrop" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
      <div class="flex justify-between items-start mb-1">
        <h2 class="text-xl font-bold text-slate-900">Reserve a Slot</h2>
        <button id="closeModal" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">&times;</button>
      </div>
      <p id="modalDetails" class="text-sm text-slate-500 mb-5"></p>
      <form id="reserveForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
          <input type="text" id="inputName" required
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Room No.</label>
          <input type="text" id="inputRoom" required
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" id="cancelBtn"
                  class="flex-1 rounded-lg border border-slate-300 py-2 font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
          <button type="submit"
                  class="flex-1 rounded-lg bg-indigo-600 py-2 font-medium text-white hover:bg-indigo-700">Confirm</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const MACHINES = [1, 2, 3];
    const DAYS = 7;
    const API_URL = "/api/reservations";

    let activeMachine = 1;
    let selectedDayIndex = 0; // 0 = today ... up to DAYS-1
    let pendingSlot = null; // { machine, dateKey, hour }

    // reservations: { "machine|YYYY-MM-DD|hour": { name, room } }
    let reservations = {};

    // Pull all reservations from the Netlify DB function and index them by slot key.
    async function loadReservations() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error("Failed to load reservations.");
        const data = await res.json();
        const map = {};
        for (const r of data.reservations || []) {
          map[slotKey(r.machine, r.date, r.hour)] = { name: r.name, room: r.room };
        }
        reservations = map;
      } catch (e) {
        console.error(e);
        // Keep whatever we have; the UI still renders available slots.
      }
    }

    function dateKey(d) {
      return d.toISOString().slice(0, 10);
    }
    function slotKey(machine, dKey, hour) {
      return `${machine}|${dKey}|${hour}`;
    }
    function pad(n) { return String(n).padStart(2, "0"); }

    function buildMachineTabs() {
      const container = document.getElementById("machineTabs");
      container.innerHTML = "";
      MACHINES.forEach(m => {
        const btn = document.createElement("button");
        btn.textContent = "Machine " + m;
        btn.className = "px-5 py-2 rounded-full font-medium transition " +
          (m === activeMachine
            ? "bg-indigo-600 text-white shadow"
            : "bg-white text-slate-600 border border-slate-300 hover:bg-slate-50");
        btn.onclick = () => { activeMachine = m; render(); };
        container.appendChild(btn);
      });
    }

    function dayForIndex(i) {
      const day = new Date();
      day.setHours(0, 0, 0, 0);
      day.setDate(day.getDate() + i);
      return day;
    }

    function buildDateSelect() {
      const select = document.getElementById("dateSelect");
      select.innerHTML = "";
      for (let i = 0; i < DAYS; i++) {
        const day = dayForIndex(i);
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = day.toLocaleDateString(undefined, {
          weekday: "long", month: "short", day: "numeric"
        }) + (i === 0 ? " (Today)" : "");
        if (i === selectedDayIndex) opt.selected = true;
        select.appendChild(opt);
      }
      select.onchange = () => { selectedDayIndex = Number(select.value); render(); };
    }

    function render() {
      buildMachineTabs();
      buildDateSelect();
      const schedule = document.getElementById("schedule");
      schedule.innerHTML = "";

      const now = new Date();

      {
        const i = selectedDayIndex;
        const day = dayForIndex(i);
        const dKey = dateKey(day);

        const card = document.createElement("div");
        card.className = "bg-white rounded-2xl shadow-sm p-5";

        const heading = document.createElement("h3");
        heading.className = "font-semibold text-slate-900 mb-4";
        heading.textContent = day.toLocaleDateString(undefined, {
          weekday: "long", month: "short", day: "numeric"
        }) + (i === 0 ? " (Today)" : "");
        card.appendChild(heading);

        const grid = document.createElement("div");
        grid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2";

        for (let h = 0; h < 24; h++) {
          const btn = document.createElement("button");
          const label = `${pad(h)}:00 - ${pad(h + 1)}:00`;
          btn.textContent = label;

          const slotStart = new Date(day);
          slotStart.setHours(h, 0, 0, 0);
          const slotEnd = new Date(slotStart);
          slotEnd.setHours(h + 1);

          const isPast = slotEnd <= now;
          const key = slotKey(activeMachine, dKey, h);
          const reserved = reservations[key];

          btn.className = "text-xs font-medium rounded-lg py-2 px-1 border transition ";

          if (isPast) {
            btn.disabled = true;
            btn.className += "bg-slate-200 text-slate-400 border-slate-200 cursor-not-allowed line-through";
          } else if (reserved) {
            btn.disabled = true;
            btn.className += "bg-rose-500 text-white border-rose-500 cursor-not-allowed";
            btn.title = `Reserved by ${reserved.name} (Room ${reserved.room})`;
          } else {
            btn.className += "bg-white text-slate-700 border-slate-300 hover:bg-indigo-50 hover:border-indigo-400 hover:text-indigo-700";
            btn.onclick = () => openModal(activeMachine, dKey, h, label, heading.textContent);
          }

          grid.appendChild(btn);
        }

        card.appendChild(grid);
        schedule.appendChild(card);
      }
    }

    // Modal handling
    const backdrop = document.getElementById("modalBackdrop");
    const form = document.getElementById("reserveForm");

    function openModal(machine, dKey, hour, label, dayLabel) {
      pendingSlot = { machine, dKey, hour };
      document.getElementById("modalDetails").textContent =
        `Machine ${machine} • ${dayLabel} • ${label}`;
      form.reset();
      backdrop.classList.remove("hidden");
      backdrop.classList.add("flex");
      document.getElementById("inputName").focus();
    }

    function closeModal() {
      pendingSlot = null;
      backdrop.classList.add("hidden");
      backdrop.classList.remove("flex");
    }

    document.getElementById("closeModal").onclick = closeModal;
    document.getElementById("cancelBtn").onclick = closeModal;
    backdrop.addEventListener("click", e => { if (e.target === backdrop) closeModal(); });

    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener("submit", async e => {
      e.preventDefault();
      if (!pendingSlot) return;
      const name = document.getElementById("inputName").value.trim();
      const room = document.getElementById("inputRoom").value.trim();
      if (!name || !room) return;

      const slot = pendingSlot;
      submitBtn.disabled = true;
      submitBtn.textContent = "Saving...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            machine: slot.machine,
            date: slot.dKey,
            hour: slot.hour,
            name,
            room,
          }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || "Could not save the reservation. Please try again.");
          // If the slot was already taken by someone else, refresh to reflect it.
          if (res.status === 409) { await loadReservations(); render(); closeModal(); }
          return;
        }

        reservations[slotKey(slot.machine, slot.dKey, slot.hour)] = { name, room };
        closeModal();
        render();
      } catch (err) {
        console.error(err);
        alert("Network error. Please try again.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Confirm";
      }
    });

    // Initial load: fetch from the database, then render.
    (async () => {
      await loadReservations();
      render();
    })();
  </script>
</body>
</html>
